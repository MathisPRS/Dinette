services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  translate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: "en,fr"
      LT_DISABLE_WEB_UI: "true"
      LT_DISABLE_FILES_TRANSLATION: "true"
      LT_ARGOS_PACKAGES_DIR: /app/db/argos-translate/packages
    volumes:
      - ./data/libretranslate:/app/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      UPLOAD_DIR: ${UPLOAD_DIR}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID}
      WEBAUTHN_ORIGINS: ${WEBAUTHN_ORIGINS}
      SEED_TEST_USER: ${SEED_TEST_USER}
      SEED_DEMO_RECIPES: ${SEED_DEMO_RECIPES}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD}
      SEED_USER_NAME: ${SEED_USER_NAME}
      LIBRETRANSLATE_URL: http://translate:5000
      SPOONACULAR_API_KEY: ${SPOONACULAR_API_KEY:-}
    volumes:
      - ./data/uploads:/app/backend/uploads
    ports:
      - "8041:80"
    depends_on:
      db:
        condition: service_healthy
      translate:
        condition: service_started
